<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- https://github.com/frappe/gantt -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt/dist/frappe-gantt.css">
    <link rel="stylesheet" href="css/gantt.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/snap.svg/0.5.1/snap.svg-min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/frappe-gantt/dist/frappe-gantt.umd.js"></script>
    <script defer src="js/gantt.js"></script>
  </head>
  <body>
    <h1>Gantt Chart</h1>
    <table id="task-table" border="1" style="margin-bottom: 20px;">
      <thead>
        <tr>
          <th>タスク名</th>
          <th>開始日</th>
          <th>終了日</th>
          <th>進捗(%)</th>
          <th>依存関係</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>要件定義</td>
          <td>2026-04-01</td>
          <td>2026-04-05</td>
          <td>100</td>
          <td>なし</td>
        </tr>
        <tr>
          <td>設計-デザイン</td>
          <td>2026-04-06</td>
          <td>2026-04-15</td>
          <td>50</td>
          <td>要件定義</td>
        </tr>
        <tr>
          <td>実装-開発</td>
          <td>2026-04-10</td>
          <td>2026-04-30</td>
          <td>10</td>
          <td>設計-デザイン</td>
        </tr>
        <tr>
          <td>単体テスト</td>
          <td>2026-05-01</td>
          <td>2026-05-30</td>
          <td>10</td>
          <td>実装-開発</td>
        </tr>
      </tbody>
    </table>

    <div id="gantt-target"></div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
      createGantt(document.getElementById('task-table'), '#gantt-target');
    });
    </script>
  </body>
</html>
